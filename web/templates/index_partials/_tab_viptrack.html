  <div id="tab-viptrack" class="tab-content{% if active_tab == 'viptrack' %} active{% endif %}" style="padding:0!important;margin:0!important;overflow:hidden;">
    <style>
      #tab-viptrack {
        padding: 0 !important;
        margin: 0 !important;
        overflow: hidden !important;
        position: relative;
        width: 100% !important;
        height: calc(100vh - 20px) !important;
        min-height: calc(100vh - 20px) !important;
      }
      /* Kill container padding when VIPTrack is the active tab */
      .container:has(#tab-viptrack.active) {
        padding: 0 !important;
      }
      #tab-viptrack .vt-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        background: #1a1a2e;
      }
    </style>
    <iframe src="/viptrack/" class="vt-frame" title="VIPTrack — Military & VIP Flight Tracker" allowfullscreen></iframe>
  </div>
