name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: NOMADFieldDesk-Windows
            binary: dist/NOMADFieldDesk.exe
            release_name: NOMADFieldDesk-Windows.exe
          - os: ubuntu-22.04
            artifact: NOMADFieldDesk-Linux
            binary: dist/NOMADFieldDesk
            release_name: NOMADFieldDesk-Linux
          - os: macos-latest
            artifact: NOMADFieldDesk-macOS
            binary: dist/NOMADFieldDesk
            release_name: NOMADFieldDesk-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux: install system deps for pywebview and pystray
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi gir1.2-webkit2-4.1 gobject-introspection \
            libgirepository1.0-dev libcairo2-dev pkg-config \
            libappindicator3-dev gir1.2-appindicator3-0.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt "pyinstaller>=6.0,<7.0" pytest pytest-cov

      - name: Install xvfb (Linux only — pywebview/Xlib needs a display to import)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Run tests with coverage
        # Wrap in xvfb-run on Linux so `import webview` doesn't crash with
        # "Bad display name" when tests transitively import nomad.py.
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a pytest tests/ -x -q --tb=short --cov=web --cov=db --cov-report=xml --cov-report=term-missing
          else
            pytest tests/ -x -q --tb=short --cov=web --cov=db --cov-report=xml --cov-report=term-missing
          fi
        shell: bash

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build frontend bundle
        run: npm ci && node esbuild.config.mjs

      - name: Build binary
        run: pyinstaller build.spec

      # Windows: also build Inno Setup installer
      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: runner.os == 'Windows'
        run: iscc installer.iss

      # Windows: sign binary and installer if code signing cert is configured
      - name: Sign Windows binaries
        if: runner.os == 'Windows'
        env:
          CODESIGN_CERT: ${{ secrets.CODESIGN_CERT_BASE64 }}
          CODESIGN_PASS: ${{ secrets.CODESIGN_CERT_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:CODESIGN_CERT) { Write-Host "No code signing cert configured — skipping"; exit 0 }
          $certBytes = [Convert]::FromBase64String($env:CODESIGN_CERT)
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          & signtool sign /f $certPath /p $env:CODESIGN_PASS /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist\NOMADFieldDesk.exe
          if (Test-Path NOMAD-Setup.exe) {
            & signtool sign /f $certPath /p $env:CODESIGN_PASS /tr http://timestamp.digicert.com /td sha256 /fd sha256 NOMAD-Setup.exe
          }
          Remove-Item $certPath -Force

      # Linux: mark binary executable
      - name: Mark executable
        if: runner.os != 'Windows'
        run: chmod +x dist/NOMADFieldDesk

      # macOS: sign binary if Apple Developer certificate is configured
      - name: Sign macOS binary
        if: runner.os == 'macOS'
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_BASE64" ]; then
            echo "No macOS signing certificate configured — skipping code signing"
            exit 0
          fi
          echo "$MACOS_CERT_BASE64" | base64 --decode > /tmp/macos_cert.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/macos_cert.p12 -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          codesign --force --options runtime \
            --sign "Developer ID Application: $APPLE_TEAM_ID" \
            dist/NOMADFieldDesk
          echo "Code signing complete"
          # Notarize if Apple ID credentials are provided
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_ID_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Submitting for notarization..."
            ditto -c -k --keepParent dist/NOMADFieldDesk /tmp/NOMADFieldDesk-notarize.zip
            xcrun notarytool submit /tmp/NOMADFieldDesk-notarize.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            echo "Notarization complete"
          else
            echo "Apple ID credentials not set — skipping notarization"
          fi
          rm -f /tmp/macos_cert.p12 /tmp/NOMADFieldDesk-notarize.zip

      # Linux: build AppImage from PyInstaller binary
      - name: Build AppImage
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          bash tools/build_appimage.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

      - name: Upload installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: NOMAD-Setup
          path: NOMAD-Setup.exe

      - name: Upload AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: NOMADFieldDesk-AppImage
          path: NOMADFieldDesk*.AppImage

  release:
    needs: build
    # Run even if some matrix jobs fail — upload whatever artifacts exist.
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          set +e
          mkdir -p release
          # Copy each artifact only if it exists — don't bail when one OS failed
          [ -f artifacts/NOMADFieldDesk-Windows/NOMADFieldDesk.exe ] && cp artifacts/NOMADFieldDesk-Windows/NOMADFieldDesk.exe release/NOMADFieldDesk-Windows.exe
          [ -f artifacts/NOMADFieldDesk-Linux/NOMADFieldDesk ]       && cp artifacts/NOMADFieldDesk-Linux/NOMADFieldDesk       release/NOMADFieldDesk-Linux
          [ -f artifacts/NOMADFieldDesk-macOS/NOMADFieldDesk ]       && cp artifacts/NOMADFieldDesk-macOS/NOMADFieldDesk       release/NOMADFieldDesk-macOS
          [ -f artifacts/NOMAD-Setup/NOMAD-Setup.exe ]               && cp artifacts/NOMAD-Setup/NOMAD-Setup.exe               release/NOMAD-Setup.exe
          if ls artifacts/NOMADFieldDesk-AppImage/NOMADFieldDesk*.AppImage 1>/dev/null 2>&1; then
            cp artifacts/NOMADFieldDesk-AppImage/NOMADFieldDesk*.AppImage release/NOMADFieldDesk-Linux-x86_64.AppImage
          fi
          chmod +x release/NOMADFieldDesk-Linux release/NOMADFieldDesk-macOS 2>/dev/null || true
          chmod +x release/*.AppImage 2>/dev/null || true
          if [ -z "$(ls -A release/)" ]; then
            echo "ERROR: No release artifacts present at all"
            exit 1
          fi
          cd release && sha256sum * > SHA256SUMS.txt
          echo "=== Release contents ==="
          ls -la

      # NOTE: ARM64 Linux/macOS builds are a future addition.
      # GitHub Actions lacks free native ARM64 runners; would require QEMU
      # cross-compilation or self-hosted runners.
      - name: Upload release assets
        run: |
          # Upload whichever artifacts were produced
          ASSETS=()
          for f in release/*; do
            [ -f "$f" ] && ASSETS+=("$f")
          done
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No assets to upload"
            exit 1
          fi
          gh release upload ${{ github.ref_name }} \
            "${ASSETS[@]}" \
            --repo ${{ github.repository }} \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
