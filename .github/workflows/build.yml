name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install flask requests pywebview pystray pillow psutil PyPDF2 pyinstaller

      - name: Build portable exe
        run: pyinstaller build.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer.iss

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: ProjectNOMAD-Portable
          path: dist/ProjectNOMAD.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ProjectNOMAD-Setup
          path: ProjectNOMAD-Setup.exe

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create ${{ github.ref_name }} --generate-notes
          gh release upload ${{ github.ref_name }} dist/ProjectNOMAD.exe --clobber
          gh release upload ${{ github.ref_name }} ProjectNOMAD-Setup.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
